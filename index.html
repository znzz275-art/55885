<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapVee Pro | محمل الفيديوهات الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 100% { left: 100%; } }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-2xl rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600 rounded-full blur-[80px] opacity-20"></div>

        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold gradient-text mb-2">SnapVee Pro</h1>
            <p class="text-gray-400">حمل فيديوهاتك المفضلة بأعلى جودة بضغطة واحدة</p>
        </header>

        <div class="space-y-4">
            <div class="relative group">
                <i class="fa-solid fa-link absolute right-4 top-1/2 -translate-y-1/2 text-blue-400 group-focus-within:text-blue-300 transition-colors"></i>
                <input type="text" id="videoUrl" 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-4 pr-12 pl-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-600"
                    placeholder="ضع رابط الفيديو هنا (YouTube, TikTok, Instagram...)">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="processDownload('video')" class="shimmer bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-transform active:scale-95">
                    <i class="fa-solid fa-video"></i> تحميل MP4
                </button>
                <button onclick="processDownload('audio')" class="shimmer bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-transform active:scale-95">
                    <i class="fa-solid fa-music"></i> تحميل MP3
                </button>
            </div>
        </div>

        <div class="mt-8 border-t border-slate-700 pt-6">
            <button onclick="toggleSettings()" class="text-gray-400 hover:text-white flex items-center gap-2 mb-4 transition-colors">
                <i class="fa-solid fa-sliders"></i> <span class="text-sm font-bold uppercase tracking-wider">الإعدادات المتقدمة</span>
            </button>
            
            <div id="settingsBox" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in">
                <div>
                    <label class="text-xs text-gray-500 block mb-2">جودة الفيديو</label>
                    <select id="quality" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm outline-none">
                        <option value="max">أعلى جودة متاحة (4K/1080p)</option>
                        <option value="720">720p HD</option>
                        <option value="480">480p SD</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-2">خادم المعالجة</label>
                    <select class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm outline-none">
                        <option>خادم SnapVee الرئيسي</option>
                        <option>خادم احتياطي (Global)</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 mt-2">
                    <input type="checkbox" id="muteVideo" class="rounded border-slate-700 bg-slate-800 text-blue-500">
                    <label for="muteVideo" class="text-xs text-gray-400">تحميل بدون صوت (فيديو فقط)</label>
                </div>
            </div>
        </div>

        <div id="statusArea" class="mt-6 hidden">
            <div class="flex items-center gap-4 bg-slate-900/80 p-4 rounded-xl border border-blue-500/30">
                <div class="animate-spin text-blue-500">
                    <i class="fa-solid fa-circle-notch text-xl"></i>
                </div>
                <div class="flex-1">
                    <p id="statusText" class="text-sm font-bold">جاري تحليل الرابط...</p>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full mt-2 overflow-hidden">
                        <div id="progressBar" class="bg-blue-500 h-full w-0 transition-all duration-500"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleSettings() {
            const box = document.getElementById('settingsBox');
            box.classList.toggle('hidden');
        }

        async function processDownload(mode) {
            const url = document.getElementById('videoUrl').value;
            const statusArea = document.getElementById('statusArea');
            const statusText = document.getElementById('statusText');
            const progressBar = document.getElementById('progressBar');
            const quality = document.getElementById('quality').value;

            if (!url) {
                alert("يرجى وضع رابط صالح أولاً!");
                return;
            }

            statusArea.classList.remove('hidden');
            statusText.innerText = "جاري الاتصال بالخادم واستخراج البيانات...";
            progressBar.style.width = "40%";

            try {
                // استخدام Cobalt API (أفضل خيار حالياً للمطورين)
                const response = await fetch("https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json",
                    },
                    body: JSON.stringify({
                        url: url,
                        downloadMode: mode, // 'audio' or 'video'
                        videoQuality: quality,
                        filenameStyle: 'pretty'
                    })
                });

                const data = await response.json();

                if (data.status === 'stream' || data.url) {
                    progressBar.style.width = "100%";
                    statusText.innerText = "تم تجهيز الملف! سيبدأ التحميل الآن...";
                    
                    // توجيه المستخدم للتحميل
                    setTimeout(() => {
                        window.location.href = data.url;
                        statusArea.classList.add('hidden');
                        progressBar.style.width = "0%";
                    }, 2000);
                } else {
                    throw new Error(data.text || "فشل التحميل");
                }

            } catch (error) {
                statusText.innerText = "حدث خطأ: " + error.message;
                statusText.classList.add('text-red-400');
                progressBar.classList.add('bg-red-500');
            }
        }
    </script>
</body>
</html>
