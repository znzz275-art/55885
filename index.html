<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusStream | Premium Video Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0b;
            --bg-surface: #161618;
            --bg-hover: #232326;
            --accent: #3d5afe;
            --accent-gradient: linear-gradient(135deg, #3d5afe 0%, #8c2ce6 100%);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: rgba(255, 255, 255, 0.08);
            --sidebar-width: 240px;
            --header-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 10px; }

        /* --- Header --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--header-height);
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-bar {
            flex: 0 1 500px;
            position: relative;
        }
        .search-bar input {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 10px 20px 10px 45px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .search-bar input:focus { border-color: var(--accent); background: var(--bg-hover); }

        /* --- Sidebar --- */
        aside {
            position: fixed;
            left: 0;
            top: var(--header-height);
            width: var(--sidebar-width);
            height: calc(100vh - var(--header-height));
            padding: 20px 12px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .menu-group { margin-bottom: 25px; }
        .menu-title { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 0 12px 10px; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-dim);
            transition: 0.2s;
            font-weight: 500;
        }
        .menu-item:hover, .menu-item.active { background: var(--bg-hover); color: var(--text-main); }

        /* --- Main Content --- */
        main {
            margin-left: var(--sidebar-width);
            margin-top: var(--header-height);
            padding: 30px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .video-card { cursor: pointer; transition: transform 0.3s; }
        .video-card:hover { transform: translateY(-5px); }

        .thumb-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-surface);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }

        .video-info { display: flex; gap: 12px; margin-top: 12px; }
        .channel-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-hover); flex-shrink: 0; }
        .video-details h3 { font-size: 14px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-meta { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

        /* --- Player Page --- */
        #player-page {
            display: none;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .iframe-container { width: 100%; aspect-ratio: 16/9; border-radius: 18px; overflow: hidden; background: #000; }
        .description-box { background: var(--bg-surface); padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 14px; line-height: 1.6; }

        /* --- Shorts --- */
        #shorts-page {
            display: none;
            flex-direction: column;
            align-items: center;
            height: calc(100vh - var(--header-height));
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .short-item {
            scroll-snap-align: start;
            min-height: calc(100vh - 100px);
            width: 350px;
            background: #000;
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        @media (max-width: 900px) {
            aside { display: none; }
            main { margin-left: 0; }
            #player-page { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="goHome()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="url(#grad)" /><path d="M16 12L10 16V8L16 12Z" fill="white"/><defs><linearGradient id="grad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse"><stop stop-color="#3d5afe"/><stop offset="1" stop-color="#8c2ce6"/></linearGradient></defs></svg>
            Nexus<span>Stream</span>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search videos...">
        </div>
        <div></div>
    </header>

    <aside>
        <div class="menu-group">
            <p class="menu-title">Discover</p>
            <div class="menu-item active" onclick="loadContent('trending')">Home</div>
            <div class="menu-item" onclick="showShorts()">Shorts</div>
            <div class="menu-item" onclick="loadContent('music')">Music</div>
            <div class="menu-item" onclick="loadContent('movies')">Movies</div>
        </div>
        <div class="menu-group">
            <p class="menu-title">Library</p>
            <div class="menu-item" onclick="showLibrary('history')">History</div>
            <div class="menu-item" onclick="showLibrary('favorites')">Favorites</div>
        </div>
    </aside>

    <main id="main-view">
        <div id="home-page">
            <div class="video-grid" id="main-grid"></div>
        </div>

        <div id="player-page">
            <div class="main-player">
                <div class="iframe-container" id="player-target"></div>
                <div class="video-header">
                    <h1 id="p-title" style="margin: 15px 0;">Video Title</h1>
                    <div id="p-meta" style="color: var(--text-dim); font-size: 14px; margin-bottom: 10px;"></div>
                    <div class="description-box" id="p-desc"></div>
                </div>
            </div>
            <div id="suggested-grid"></div>
        </div>

        <div id="shorts-page"></div>
    </main>

    <script>
        // API KEY INTEGRATED DIRECTLY
        const API_KEY = "AIzaSyBznR7oQroK6YhNQBoI6kohLmsFTa1f3rs";
        
        let history = JSON.parse(localStorage.getItem('nexus_history') || '[]');
        let favorites = JSON.parse(localStorage.getItem('nexus_favorites') || '[]');

        window.onload = () => loadContent('trending');

        async function fetchAPI(endpoint, params) {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/${endpoint}?key=${API_KEY}&${params}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data;
            } catch (err) {
                console.error("API Error: ", err);
                return null;
            }
        }

        async function loadContent(category) {
            showView('home');
            let params = 'part=snippet,statistics&maxResults=24&chart=mostPopular&regionCode=US';
            if (category !== 'trending') params = `part=snippet&maxResults=24&q=${category}&type=video`;
            
            const data = await fetchAPI(category === 'trending' ? 'videos' : 'search', params);
            if (data) renderGrid(data.items);
        }

        function renderGrid(items) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = items.map(item => {
                const id = item.id.videoId || item.id;
                return `
                    <div class="video-card" onclick="openPlayer('${id}', ${JSON.stringify(item.snippet).replace(/"/g, '&quot;')})">
                        <div class="thumb-container"><img src="${item.snippet.thumbnails.high.url}"></div>
                        <div class="video-info">
                            <div class="channel-avatar"></div>
                            <div class="video-details">
                                <h3>${item.snippet.title}</h3>
                                <div class="video-meta">${item.snippet.channelTitle}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openPlayer(id, snippet) {
            showView('player');
            document.getElementById('player-target').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('p-title').innerText = snippet.title;
            document.getElementById('p-desc').innerText = snippet.description;
            
            // Save to history
            const videoObj = { id: { videoId: id }, snippet: snippet };
            history = [videoObj, ...history.filter(v => v.id.videoId !== id)].slice(0, 50);
            localStorage.setItem('nexus_history', JSON.stringify(history));
        }

        async function showShorts() {
            showView('shorts');
            const data = await fetchAPI('search', 'part=snippet&maxResults=10&q=shorts&type=video&videoDuration=short');
            document.getElementById('shorts-page').innerHTML = data.items.map(item => `
                <div class="short-item">
                    <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${item.id.videoId}?autoplay=0&controls=0" frameborder="0"></iframe>
                </div>
            `).join('');
        }

        function showView(view) {
            document.getElementById('home-page').style.display = view === 'home' ? 'block' : 'none';
            document.getElementById('player-page').style.display = view === 'player' ? 'grid' : 'none';
            document.getElementById('shorts-page').style.display = view === 'shorts' ? 'flex' : 'none';
        }

        function goHome() { loadContent('trending'); }

        function showLibrary(type) {
            showView('home');
            const data = type === 'history' ? history : favorites;
            renderGrid(data);
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadContent(e.target.value);
        });
    </script>
</body>
</html>
