<style>

  .stats { display:flex; justify-content:center; gap:30px; flex-wrap:wrap; margin-bottom:40px; }
  .stat-num { font-size:24px; font-weight:900; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .stat-label { font-size:12px; color:var(--muted); }
  .search-wrap { display:flex; justify-content:center; margin-bottom:30px; }
  .search-box { background:var(--card); border:1px solid var(--border); border-radius:50px; padding:12px 24px; color:var(--text); font-family:'Cairo',sans-serif; font-size:15px; width:100%; max-width:500px; outline:none; transition:border-color 0.2s; text-align:right; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:20px; overflow:hidden; transition:transform 0.3s,box-shadow 0.3s,border-color 0.3s; animation:fadeUp 0.5s ease both; }
  .card:hover { transform:translateY(-6px); box-shadow:0 20px 50px rgba(0,0,0,0.5),var(--glow); border-color:rgba(124,58,237,0.4); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .img-container { position:relative; overflow:hidden; }
  .card-img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; cursor:pointer; }
  .img-placeholder { width:100%; aspect-ratio:1/1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; background:linear-gradient(135deg,#1a1a2e,#16213e); color:var(--muted); font-size:13px; }
  .img-placeholder .icon { font-size:36px; }
  .gen-btn { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; border:none; border-radius:50px; padding:8px 20px; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; transition:opacity 0.2s,transform 0.2s; box-shadow:0 4px 20px rgba(124,58,237,0.5); }

  .card-cat { display:inline-flex; align-items:center; gap:5px; background:rgba(124,58,237,0.15); border:1px solid rgba(124,58,237,0.3); color:#c4b5fd; font-size:11px; padding:3px 12px; border-radius:50px; margin-bottom:10px; }
  .card-prompt { font-size:12px; color:var(--muted); line-height:1.7; margin-bottom:14px; direction:ltr; text-align:left; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .card-actions { display:flex; gap:8px; }
  .copy-btn { flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); padding:8px; border-radius:10px; cursor:pointer; font-family:'Cairo',sans-serif; font-size:13px; transition:all 0.2s; }

  .spinner { width:28px; height:28px; border:3px solid rgba(124,58,237,0.3); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:100; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:30px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; }
  .modal img { width:100%; border-radius:16px; margin-bottom:20px; }
  .modal-prompt { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:12px; padding:16px; font-size:13px; direction:ltr; text-align:left; line-height:1.8; color:var(--muted); margin-bottom:20px; }
  .modal-close { background:rgba(255,255,255,0.1); border:none; color:white; width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .modal-title { font-size:18px; font-weight:700; }
  .empty { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--muted); }

  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; padding:12px 28px; border-radius:50px; font-size:14px; font-weight:700; z-index:999; transition:transform 0.3s; box-shadow:0 8px 30px rgba(124,58,237,0.5); }

let searchQuery = '';
let generatingIds = new Set();
let generatedImages = {};
let modalId = null;

function init(){
  buildFilters();
  renderGrid();
  document.getElementById('totalCount').textContent = ALL_PROMPTS.length + '+';
}

function buildFilters(){
  document.getElementById('filters').innerHTML = CATS.map(c=>
    `<button class="filter-btn ${c.id==='all'?'active':''}" data-cat="${c.id}" onclick="setFilter('${c.id}')">${c.label}</button>`
  ).join('');
}

function setFilter(cat){
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  renderGrid();
}

function getFiltered(){
  return ALL_PROMPTS.filter(p=>{
    const mc = currentCat==='all' || p.cat===currentCat;
    const ms = !searchQuery || p.prompt.toLowerCase().includes(searchQuery) || p.title.includes(searchQuery);
    return mc && ms;
  });
}

const CAT_ICONS = {cinematic:'🎬',fashion:'👗',sea:'🌊',cars:'🚗',animals:'🐾',fantasy:'🔮',portrait:'🎨',architecture:'🏛️'};
const CAT_NAMES = {cinematic:'سينمائي',fashion:'أزياء',sea:'بحر',cars:'سيارات',animals:'حيوانات',fantasy:'فانتازيا',portrait:'بورتريه',architecture:'معمار'};

function renderGrid(){
  const grid = document.getElementById('grid');
  const items = getFiltered().slice(0,64);
  if(!items.length){
    grid.innerHTML = `<div class="empty"><div class="big">🔍</div><div>مش لاقي برومبتات</div></div>`;
    return;
  }
  grid.innerHTML = items.map((p,i)=>{
    const delay = (i%16)*0.04;
    const hasImg = generatedImages[p.id];
    const loading = generatingIds.has(p.id);
    return `
    <div class="card" style="animation-delay:${delay}s">
      <div class="img-container">
        ${hasImg
          ? `<img class="card-img" src="${hasImg}" alt="${p.title}" onclick="openModal(${p.id})" onerror="this.style.display='none'">`
          : `<div class="img-placeholder">${loading?`<div class="spinner"></div><div>جاري التوليد...</div>`:`<div class="icon">🎨</div><div>اضغط لتوليد الصورة</div>`}</div>`}
        <button class="gen-btn" onclick="generateImage(${p.id})" ${loading?'disabled':''}>
          ${loading?'⏳ جاري...' : hasImg?'🔄 ولّد جديد':'✨ ولّد الصورة'}
        </button>
      </div>
      <div class="card-body">
        <div class="card-cat">${CAT_ICONS[p.cat]||'✨'} ${CAT_NAMES[p.cat]||p.cat}</div>
        <div class="card-prompt">${p.prompt}</div>
        <div class="card-actions">
          <button class="copy-btn" id="copy-${p.id}" onclick="copyPrompt(${p.id})">📋 نسخ</button>
          ${hasImg?`<button class="copy-btn" onclick="openModal(${p.id})">🔍 تكبير</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function generateImage(id){
  const p = ALL_PROMPTS.find(x=>x.id===id);
  if(!p||generatingIds.has(id)) return;
  generatingIds.add(id);
  renderGrid();
  try {
    const encoded = encodeURIComponent(p.prompt);
    const url = `https://image.pollinations.ai/prompt/${encoded}?width=512&height=512&nologo=true&seed=${Math.floor(Math.random()*9999)}`;
    // Pre-load image
    await new Promise((res,rej)=>{
      const img = new Image();
      img.onload = res;
      img.onerror = rej;
      img.src = url;
      setTimeout(res, 15000); // timeout fallback
    });
    generatedImages[id] = url;
  } catch(e) {
    const encoded = encodeURIComponent(p.prompt);
    generatedImages[id] = `https://image.pollinations.ai/prompt/${encoded}?width=512&height=512&nologo=true`;
  }
  generatingIds.delete(id);
  renderGrid();
}

function copyPrompt(id){
  const p = ALL_PROMPTS.find(x=>x.id===id);
  if(!p) return;
  navigator.clipboard.writeText(p.prompt);
  const btn = document.getElementById(`copy-${id}`);
  if(btn){ btn.textContent='✅ تم!'; btn.classList.add('copied'); setTimeout(()=>{btn.textContent='📋 نسخ';btn.classList.remove('copied')},2000); }
}

function openModal(id){
  const p = ALL_PROMPTS.find(x=>x.id===id);
  if(!p||!generatedImages[id]) return;
  modalId = id;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalImg').src = generatedImages[id];
  document.getElementById('modalPrompt').textContent = p.prompt;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function copyModalPrompt(){
  const p = ALL_PROMPTS.find(x=>x.id===modalId);
  if(!p) return;
  navigator.clipboard.writeText(p.prompt);
  showToast();
}

function showToast(){
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery = e.target.value.toLowerCase();
  renderGrid();
});

document.getElementById('modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });

init();
</script>
</body>
</html>
