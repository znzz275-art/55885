<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SnapVee - تحميل سريع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; font-family: sans-serif; color: white; }
        .card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-radius: 20px; padding: 2rem; border: 1px solid #334155; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="card w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-6 text-blue-400">SnapVee</h1>
        <input type="text" id="url" class="w-full p-4 rounded-lg bg-slate-900 border border-slate-700 mb-4 outline-none focus:border-blue-500" placeholder="ضع رابط الفيديو هنا...">
        <div class="flex gap-2">
            <button onclick="startDownload('video')" class="flex-1 bg-blue-600 p-4 rounded-lg font-bold hover:bg-blue-500">فيديو MP4</button>
            <button onclick="startDownload('audio')" class="flex-1 bg-emerald-600 p-4 rounded-lg font-bold hover:bg-emerald-500">صوت MP3</button>
        </div>
        <p id="msg" class="mt-4 text-sm text-gray-400"></p>
    </div>

    <script>
        async function startDownload(mode) {
            const url = document.getElementById('url').value;
            const msg = document.getElementById('msg');
            if(!url) return alert("أدخل الرابط!");

            msg.innerText = "جاري التحضير... انتظر قليلاً";
            
            try {
                // هنا بنستخدم البروكسي (corsproxy.io) عشان يحل مشكلة الـ Failed to fetch
                // بدون الحاجة لبرامج برمجة أو سيرفر خاص بك
                const response = await fetch("https://corsproxy.io/?https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({ url: url, downloadMode: mode })
                });

                const data = await response.json();
                if(data.url) {
                    window.location.href = data.url;
                    msg.innerText = "بدأ التحميل!";
                } else {
                    msg.innerText = "عذراً، الرابط غير مدعوم أو فيه مشكلة.";
                }
            } catch (e) {
                msg.innerText = "حدث خطأ في الاتصال. حاول مرة أخرى.";
            }
        }
    </script>
</body>
</html>
