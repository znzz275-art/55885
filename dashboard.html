<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | إضافة خبر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <h2>إضافة خبر جديد</h2>
        <form id="postForm">
            <input type="text" id="postTitle" placeholder="عنوان الخبر" required>
            <input type="file" id="postImg" accept="image/*" required>
            <textarea id="postContent" rows="10" placeholder="محتوى الخبر..." required></textarea>
            <button type="submit" id="submitBtn">نشر الخبر</button>
        </form>
        <br>
        <a href="index.html">العودة للرئيسية</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="app.js"></script>
    <script>
        const postForm = document.getElementById('postForm');
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if(!user) return alert("يجب تسجيل الدخول أولاً");

            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const file = document.getElementById('postImg').files[0];
            const btn = document.getElementById('submitBtn');

            btn.innerText = "جاري النشر...";
            btn.disabled = true;

            try {
                // 1. Upload Image
                const storageRef = firebase.storage().ref(`news/${Date.now()}_${file.name}`);
                await storageRef.put(file);
                const imageUrl = await storageRef.getDownloadURL();

                // 2. Save to Firestore
                await db.collection("articles").add({
                    title,
                    content,
                    imageUrl,
                    author: user.displayName || user.email,
                    authorId: user.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("تم نشر الخبر بنجاح!");
                window.location.href = "index.html";
            } catch (error) {
                alert("خطأ: " + error.message);
                btn.innerText = "نشر الخبر";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
