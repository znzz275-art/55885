<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل الخبر | أخبار الزمالك</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 900px; margin: 50px auto; background: white; padding: 20px;">
        <div id="articleDetail">
            <!-- Dynamic Content -->
        </div>
        <hr>
        <a href="index.html" style="display: inline-block; margin-top: 20px;">العودة للرئيسية</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        if (articleId) {
            db.collection("articles").doc(articleId).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('articleDetail').innerHTML = `
                        <h1 style="color: var(--zamalek-red); margin-bottom: 20px;">${data.title}</h1>
                        <p style="color: #666; font-size: 0.9rem;">بواسطة: ${data.author} | التاريخ: ${new Date(data.timestamp.toDate()).toLocaleString('ar-EG')}</p>
                        <img src="${data.imageUrl}" style="width: 100%; border-radius: 10px; margin: 20px 0;">
                        <div style="font-size: 1.2rem; white-space: pre-wrap;">${data.content}</div>
                    `;
                    document.title = data.title;
                } else {
                    window.location.href = "404.html";
                }
            });
        }
    </script>
</body>
</html>
